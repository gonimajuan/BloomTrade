# BloomTrade — Stack de infraestructura local
#
# Servicios: postgres, redis, elasticsearch, logstash, kibana, mailhog.
# Backend y frontend se agregan en T08 y T10 (Día 0).
#
# Uso:
#   cp .env.example .env
#   docker compose up -d
#
# Mitigación de riesgo ROADMAP §7: ES y Logstash con heap de 512m fijo.

name: bloomtrade

services:
  # ─── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bloomtrade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"  # host 5433 → contenedor 5432; evita choque con Postgres local nativo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bloomtrade-net

  # ─── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bloomtrade-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bloomtrade-net

  # ─── Elasticsearch 8 ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: bloomtrade-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      cluster.name: bloomtrade-logs
      node.name: bloomtrade-es-01
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - bloomtrade-net

  # ─── Logstash 8 ──────────────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: bloomtrade-logstash
    restart: unless-stopped
    environment:
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9600/_node/stats >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - bloomtrade-net

  # ─── Kibana 8 ────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: bloomtrade-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      SERVER_NAME: bloomtrade-kibana
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5601/api/status >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - bloomtrade-net

  # ─── MailHog (captura local de emails) ───────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: bloomtrade-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # UI web
    networks:
      - bloomtrade-net

  # ─── Backend (Spring Boot 3 + Java 21) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bloomtrade-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Sobrescribe las defaults de application-dev.yml (que apuntan a localhost:5433)
      # para usar los nombres de servicio de la red Docker interna.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5044
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      # JWT (HU-F02 Lote A): el JwtService valida >= 32 bytes en el constructor.
      # `:?` aborta el up con mensaje accionable si falta o queda vacío en .env.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET debe estar definido en .env (>=32 bytes; generar con openssl rand -base64 64)}
      JWT_ACCESS_TTL_MINUTES: ${JWT_ACCESS_TTL_MINUTES:-15}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      logstash:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - bloomtrade-net

  # ─── Frontend (React 18 + Vite, servido por nginx) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bloomtrade-frontend
    restart: unless-stopped
    ports:
      - "5173:80"  # host 5173 (DoD del Día 0) → contenedor nginx en 80
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bloomtrade-net

volumes:
  postgres_data:
    name: bloomtrade-postgres-data
  redis_data:
    name: bloomtrade-redis-data
  es_data:
    name: bloomtrade-es-data

networks:
  bloomtrade-net:
    name: bloomtrade-net
    driver: bridge
