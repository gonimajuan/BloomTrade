name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  # ─── Backend: build + test + jacoco + SonarCloud ─────────────────────────────
  backend:
    name: Backend (build + test + sonar)
    runs-on: ubuntu-latest
    # Postgres como service: consecuencia del pivot D16 — el perfil 'test'
    # apunta a localhost:5433/bloomtrade_test (ver backend/src/main/resources/
    # application-test.yml). El smoke y los IT requieren la BD lista al arrancar.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bloomtrade
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: bloomtrade_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U bloomtrade -d bloomtrade_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      # Redis para HU-F02 (Lote F T5.10): los IT AuthFlowIT y LockoutFlowIT requieren un
      # Redis real. El secret de JWT viene hardcodeado en application-test.yml, no por env.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud necesita el full history para blame por línea.

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build + test + jacoco
        working-directory: backend
        run: mvn -B -V verify

      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload jacoco report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 7

  # ─── Frontend: lint + build ──────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Test (vitest)
        run: npm run test

      - name: Build
        run: npm run build
