# BloomTrade — Mensajes humanos (ES) por código de error.
# El codigo SCREAMING_SNAKE es el `message` de cada constraint (decision D10 del plan HU-F01);
# el GlobalExceptionHandler resuelve aqui el texto legible. Cargado en UTF-8.

VALIDATION_REQUIRED=Este campo es obligatorio
VALIDATION_FAILED=Uno o más campos no superaron la validación
VALIDATION_INVALID_EMAIL=Formato de email inválido
WEAK_PASSWORD=Password debe tener al menos 10 caracteres, una mayúscula, una minúscula y un número
VALIDATION_INVALID_NAME=Nombre inválido: 3 a 100 caracteres, solo letras, espacios y tildes
VALIDATION_INVALID_DOCUMENT_TYPE=Tipo de documento inválido (CC, CE o PASAPORTE)
VALIDATION_INVALID_DOCUMENT_NUMBER=Número de documento inválido para el tipo seleccionado
VALIDATION_INVALID_PHONE=Teléfono inválido: formato E.164, por ejemplo +573001234567
TERMS_NOT_ACCEPTED=Debe aceptar los términos y condiciones para registrarse
EMAIL_ALREADY_REGISTERED=El correo electrónico ya está registrado en el sistema
INTERNAL_ERROR=Error temporal del servidor. Por favor intenta de nuevo en unos momentos.

# HU-F02 + HU-F03 Login + MFA
TOKEN_EXPIRED=El token de acceso ha expirado. Inicia sesión de nuevo.
TOKEN_INVALID=Token de acceso inválido.
INVALID_CREDENTIALS=Credenciales inválidas.
ACCOUNT_NOT_ACTIVE=Tu cuenta no está activa. Contacta al administrador.
ACCOUNT_LOCKED=Cuenta bloqueada temporalmente por demasiados intentos fallidos.
VALIDATION_INVALID_OTP=Código OTP inválido (debe ser 6 dígitos numéricos).
MFA_INVALID_CODE=Código incorrecto.
MFA_CODE_EXPIRED=El código ha expirado. Por favor solicita uno nuevo.
TEMP_SESSION_INVALID=Tu sesión ha expirado. Por favor inicia sesión de nuevo.
MFA_SESSION_INVALIDATED=Demasiados intentos. Por favor inicia sesión de nuevo.
RESEND_COOLDOWN_ACTIVE=Espera unos segundos antes de solicitar otro código.
MAX_RESENDS_EXCEEDED=Has alcanzado el máximo de reenvíos. Por favor inicia sesión de nuevo.

# HU-F04 + HU-F20 Perfil + Notificaciones
READ_ONLY_FIELD_MODIFIED=Ese campo no puede ser modificado desde el perfil.
INVALID_TICKER=El ticker seleccionado no está en el catálogo permitido.
TOO_MANY_TICKERS=No puedes seleccionar más de 25 tickers.
DUPLICATE_TICKERS=La lista de tickers no puede contener duplicados.
VALIDATION_INVALID_CHANNEL=Canal de notificación inválido (debe ser EMAIL, SMS o WHATSAPP).

# HU-F06 Suscripción premium con Stripe
SUBSCRIPTION_ALREADY_ACTIVE=Ya tienes una suscripción activa.
NO_STRIPE_CUSTOMER=No tienes una suscripción que gestionar.
STRIPE_API_ERROR=El servicio de pagos no responde. Intenta de nuevo en unos minutos.
WEBHOOK_SIGNATURE_INVALID=Firma de webhook inválida.
VALIDATION_INVALID_PLAN=Plan inválido (debe ser MONTHLY o YEARLY).
