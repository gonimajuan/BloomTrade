# BloomTrade — Perfil 'test'
#
# Diseño: los tests (smoke + IT) corren contra el Postgres del docker-compose ya levantado
# en `localhost:5433`, sobre una BD separada `bloomtrade_test` para no contaminar la de dev.
# Se eligió este camino sobre Testcontainers por incompatibilidad observada entre docker-java
# y el pipe `dockerDesktopLinuxEngine` de Docker Desktop reciente en Windows (HU-F01 Día 1).
# Las deps de Testcontainers quedan en pom.xml para retomar el camino cuando se resuelva.
#
# Pre-requisito (una vez): `docker compose up -d postgres` y crear la BD test:
#   docker exec bloomtrade-postgres psql -U bloomtrade -d bloomtrade -c "CREATE DATABASE bloomtrade_test;"
#
# Para CI: el workflow .github/workflows/ci.yml debe levantar un service postgres equivalente.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/bloomtrade_test
    username: ${POSTGRES_USER:bloomtrade}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    clean-disabled: false

management:
  health:
    # Evita el choque conocido @MockBean JavaMailSender vs MailHealthContributor
    # ("Beans must not be empty") en los ITs que mockean el mailSender.
    mail:
      enabled: false

# JWT secret para perfil 'test' (HU-F02): 64 bytes para HmacSHA256.
jwt:
  secret: test-only-jwt-secret-64-bytes-long-for-hmac-sha256-do-not-use-in-prod
  access-ttl-minutes: 15

# Stripe — valores dummy para perfil 'test' (HU-F06). El SDK se inicializa pero los IT
# que necesiten Stripe usarán WireMock (D19 plan); ninguno hace llamadas reales con esta key.
# Prefijo rk_ para que StripeConfig no loguee el WARN de "no es RAK".
stripe:
  api-key: rk_test_dummy_for_unit_tests_only
  webhook-secret: whsec_test_dummy_for_unit_tests_only
  price:
    monthly: price_test_dummy_monthly
    yearly: price_test_dummy_yearly
  return-url: http://localhost:5173

# Alpaca — valores dummy para perfil 'test' (HU-F09). IntegrationConfig.validateCredentials
# rechaza blank/placeholder "replace_me"; estos valores pasan el check. Los IT que hagan
# llamadas reales a Alpaca usarán WireMock con baseUrl override (Lote G).
alpaca:
  api-key: PKTEST_dummy_for_unit_tests_only
  api-secret: dummy_secret_64_chars_for_unit_tests_only_not_a_real_alpaca_secret
  trading-base-url: https://paper-api.alpaca.markets
  data-base-url: https://data.alpaca.markets
  connect-timeout: 2s
  read-timeout: 5s

trading:
  default-commission-pct: 0.02
  max-quantity-per-order: 10000
  # HU-F15: override del polling de cancel para tests rápidos (~50ms total vs 2s prod).
  cancel:
    polling:
      interval-ms: 10
      max-attempts: 5

# Resilience4j override en perfil 'test': wait-duration cortos para que los IT que validan
# retry+fallback (Lote G) no demoren ~13s por test. Misma cantidad de intentos (3); solo
# acelera el backoff. NO afecta tests de unit que no usan Spring AOP.
resilience4j:
  retry:
    instances:
      alpacaTradingApi:
        max-attempts: 3
        wait-duration: 50ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      alpacaDataApi:
        max-attempts: 3
        wait-duration: 50ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

logging:
  level:
    co.edu.unbosque.bloomtrade: DEBUG
