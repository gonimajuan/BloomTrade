# BloomTrade — Configuración común
# Perfiles específicos en application-dev.yml / application-test.yml.

spring:
  application:
    name: bloomtrade
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    deserialization:
      # HU-F04+F20 D3: rechaza payloads con campos no declarados (ej. cliente intenta PATCH /me
      # con "email": "x"). El GlobalExceptionHandler mapea UnrecognizedPropertyException a
      # READ_ONLY_FIELD_MODIFIED con el field name. Los DTOs previos (RegisterRequest, LoginRequest,
      # MfaVerify/Resend) ya tienen schemas estrictos — no se rompe nada.
      fail-on-unknown-properties: true
  jpa:
    open-in-view: false   # CONVENTIONS: evita lazy-loading fuera de transacción
    hibernate:
      ddl-auto: validate  # Schema es manejado por Flyway, JPA solo valida
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: app          # Flyway crea 'app' y aloja flyway_schema_history aquí
    default-schema: app
  mail:                   # HU-F01: SMTP a MailHog (sin auth/TLS). Override en docker-compose.
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# Resilience4j — RetryPolicy para llamadas salientes hacia Stripe (TAC-D2).
# HU-F06 D1: 3 reintentos con backoff exponencial 1s, 3s, 5s (aprox). NO se reintentan
# excepciones deterministas (firma inválida, request malformado).
resilience4j:
  retry:
    instances:
      stripeApi:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 3
        retry-exceptions:
          - com.stripe.exception.ApiConnectionException
          - com.stripe.exception.ApiException
        ignore-exceptions:
          - com.stripe.exception.SignatureVerificationException
          - com.stripe.exception.InvalidRequestException
          - com.stripe.exception.AuthenticationException

# Stripe — HU-F06. Las env vars STRIPE_* las inyecta docker-compose o un .env local.
stripe:
  api-key: ${STRIPE_API_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  price:
    monthly: ${STRIPE_PRICE_MONTHLY:}
    yearly: ${STRIPE_PRICE_YEARLY:}
  return-url: ${APP_BASE_URL:http://localhost:5173}
