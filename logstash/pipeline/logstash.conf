# BloomTrade — Pipeline de Logstash
#
# Entrada: TCP 5044 con codec json_lines (formato emitido por logstash-logback-encoder del backend).
# Routing (T12.1 / G3 HU-F01):
#   - eventos de auditoría (campo `audit: true` agregado por AuditLogger, spec HU-F01 §9.1 +
#     ARCHITECTURE.md §12) → índice `audit-events-{YYYY.MM}` (STACK.md §6.4)
#   - resto de logs operacionales (INFO/WARN/ERROR de la app, logs de Spring/Hibernate/Flyway/etc.)
#     → índice `app-logs-{YYYY.MM}` (STACK.md §6.4)
#
# Los dos índices viven en el mismo Elasticsearch; la separación facilita las retenciones
# diferenciadas (audit 90 días, app-logs 30 días) y permite restringir el rol Legal/Auditoría
# al índice `audit-events-*` cuando se implemente RBAC en Kibana (post-MVP).

input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # Marca el servicio de origen. Útil cuando se sumen más fuentes en el futuro.
  mutate {
    add_field => { "service" => "bloomtrade-backend" }
  }
}

output {
  # Truthy-check del campo: el AuditLogger setea `audit: true` solo para eventos auditables.
  if [audit] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "audit-events-%{+YYYY.MM}"
    }
  } else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "app-logs-%{+YYYY.MM}"
    }
  }
}
