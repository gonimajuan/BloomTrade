# BloomTrade — Pipeline mínimo de Logstash
#
# Entrada: TCP 5044 con codec json_lines (formato emitido por logstash-logback-encoder).
# Salida: Elasticsearch, un índice por día.
#
# El backend (T07) escribirá a logstash:5044. Hasta T07, este pipeline queda listo pero sin tráfico.

input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  # Marca el servicio de origen. Útil cuando se sumen más fuentes en el futuro.
  mutate {
    add_field => { "service" => "bloomtrade-backend" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "bloomtrade-%{+YYYY.MM.dd}"
  }
}
