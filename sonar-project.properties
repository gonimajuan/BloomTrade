# BloomTrade — SonarCloud configuration
#
# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║ ACCIÓN HUMANA REQUERIDA antes del primer run de CI:                          ║
# ║                                                                              ║
# ║ 1. Crear cuenta en https://sonarcloud.io (login con GitHub).                 ║
# ║ 2. + → Analyze new project → importar el repo BloomTrade.                    ║
# ║ 3. Anotar dos valores que SonarCloud asigna:                                 ║
# ║      - sonar.organization (slug de la org, ej. 'gonimajuan')                 ║
# ║      - sonar.projectKey   (ej. 'gonimajuan_BloomTrade')                      ║
# ║ 4. Reemplazar los placeholders <...> abajo con esos valores.                 ║
# ║ 5. My Account → Security → Generate Token. Copiar el token.                  ║
# ║ 6. GitHub repo → Settings → Secrets and variables → Actions → New secret:    ║
# ║      Name: SONAR_TOKEN                                                       ║
# ║      Value: <token del paso 5>                                               ║
# ║ 7. En SonarCloud → Project → Administration → Analysis Method:               ║
# ║      DESACTIVAR "Automatic Analysis" (usamos GitHub Actions).                ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

sonar.organization=bloomtrade
sonar.projectKey=gonimajuan_BloomTrade
sonar.projectName=BloomTrade
sonar.projectVersion=0.1.0-SNAPSHOT
sonar.host.url=https://sonarcloud.io

# ─── Estructura ────────────────────────────────────────────────────────────────
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java
sonar.exclusions=**/.gitkeep,**/target/**,**/dist/**,**/node_modules/**,**/*.config.js,**/*.config.ts
sonar.test.exclusions=**/.gitkeep

# ─── Java ──────────────────────────────────────────────────────────────────────
sonar.java.source=21
sonar.java.binaries=backend/target/classes
sonar.java.test.binaries=backend/target/test-classes

# ─── Coverage ──────────────────────────────────────────────────────────────────
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# ─── General ───────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
