server {
    listen 80;
    listen [::]:80;  # IPv6: healthchecks y clientes resuelven localhost vía ::1
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: rutas client-side de React Router caen a index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy del API al backend (cuando frontend corre dentro de Docker).
    # Sin trailing slash en proxy_pass: nginx preserva el prefijo /api/. Con `/` final
    # nginx lo strippea y el backend recibe /v1/auth/... que Spring Security rechaza
    # con 403 sin body (descubierto en HITO 5 de HU-F02 Lote H).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache largo para assets estáticos (Vite agrega hash al filename → safe).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
